# =============================================================================
# CONTENTIONS (Where documents DISAGREE or DIVERGE)
# =============================================================================

contentions:

  - id: C1
    topic: "What is the canonical lifecycle loop called?"
    positions:
      D1: "Score → Rehearse → Perform (3 steps)"
      D2: "No named loop — uses Shape Up appetite + indie hacker 'ship fast'"
      D3: "Capture → Canonicalize → Systematize (3 phases of commodification, not lifecycle)"
      D4: "Frame → Shape → Build → Prove & Publish (4 steps)"
      D5: "spec.md → plan.md → status.md (3 documents, not steps)"
    analysis: |
      D1 and D4 are most operational. D1's metaphor (Score/Rehearse/Perform) is more
      musically resonant with the conductor identity. D4's verbs (Frame/Shape/Build/Prove)
      are more precise as engineering actions. D5's triad (spec/plan/status) is about
      ARTIFACTS, not phases — it's complementary, not competing.
    resolution: |
      SYNTHESIZE: Use D4's verbs as the phase names, D1's metaphor as the cultural framing,
      and D5's artifacts as the deliverables within each phase:
        FRAME (Score)    → produces spec.md
        SHAPE (Arrange)  → produces plan.md
        BUILD (Rehearse) → produces code + tests
        PROVE (Perform)  → produces status.md + release + postmortem

  - id: C2
    topic: "How much formal CS education is needed?"
    positions:
      D1: "Not a learning roadmap — assumes you'll codify what you already have"
      D2: "50-70 hours targeted learning: Git, debugging, project structure, CI/CD, dependencies"
      D3: "Minimum effective dose: 4 books (Ousterhout, Pragmatic Programmer, Refactoring.guru, Working in Public)"
      D4: "Not about learning — about encoding knowledge into Taxis automation"
      D5: "No learning roadmap — assumes enterprise-grade governance knowledge"
    analysis: |
      D2 is the most practical here. D3's book list is good but insufficient as a
      standalone learning path. The real answer: some targeted learning IS needed,
      but the AI-conductor model means you need JUDGMENT more than SYNTAX.
    resolution: |
      Adopt D2's 50-hour roadmap as the canonical "minimum viable CS knowledge" baseline,
      supplemented by D3's reading list. But prioritize JUDGMENT SKILLS over syntax:
        1. Git mental model (4-8h) — Learn Git Branching
        2. Debugging methodology (3-5h) — scientific method applied to code
        3. Project structure conventions (2-3h) — src/, README, .gitignore, .env
        4. Dependency management (3-5h) — lock files, trust evaluation
        5. CI/CD basics (3-5h) — GitHub Actions YAML
        6. Architecture judgment (5-10h) — "start monolith" heuristic, REST basics
        7. Reading: A Philosophy of Software Design (Ousterhout) — 200 pages
        Total: ~25-40 hours (not 50-70; the AI handles the rest)

  - id: C3
    topic: "Session protocol structure"
    positions:
      D1: "No session protocol — operates at milestone/roadmap level"
      D2: "No explicit session protocol — focuses on project-level discipline"
      D3: "Implicit: Three-Prompt Rule + Demystification Checklist"
      D4: "Explicit 6-step session ritual: Pick scope → AI drafts plan → You critique → Branch + TODO → Tiny slices + commit → Breadcrumb + close"
      D5: "Implicit via spec.md/plan.md/status.md document discipline"
    analysis: |
      D4 has the best session-level protocol. D5's document triad should be the
      artifacts WITHIN D4's session protocol. D3's checklists are enforcement
      mechanisms that should be embedded as gates.
    resolution: |
      Adopt D4's 6-step session ritual as canonical, embedding D5's artifacts and D3's checks:
        BEFORE (10-15 min):
          1. Pick ONE scope (D3's Single-Session Scope Limit)
          2. AI drafts micro-plan (D5: generates plan.md fragment)
          3. You critique and constrain (D3: Three-Prompt Rule applies)
        DURING (60-90 min):
          4. Tiny testable slices (D4's commit verbs: "shape:", "build:", "prove:")
          5. AI roles: Architect for Shape, Implementer for Build, Tester for Prove (D4+D5)
        AFTER (10-15 min):
          6. Update status.md/ONGOING.md + push (D5's breadcrumb + D4's issue update)

  - id: C4
    topic: "Enterprise governance level"
    positions:
      D1: "Org-wide rulesets, CODEOWNERS, branch protection — GitHub-native"
      D2: "Minimal — just use GitHub Projects and Actions"
      D3: "Decision matrices + AGENTS.md per repo"
      D4: "Taxis as discipline engine — WIP limits in registry, CI checks for docs"
      D5: "Full GitHub Enterprise Cloud: SCIM/IdP, Enterprise Teams, Custom Properties, ESM role"
    analysis: |
      D5 is the most ambitious (and most expensive — Enterprise Cloud costs money).
      D1 and D4 are pragmatic middle ground. D2 is too light for an 8-org, 80+ repo system.
      The real question: are you on GitHub Enterprise Cloud or GitHub Free/Team?
    resolution: |
      TIERED ADOPTION:
        IMMEDIATE (Free plan): D1's approach — rulesets, CODEOWNERS, branch protection, issue forms
        NEAR-TERM: D4's approach — WIP limits in registry, CI checks for missing docs/states
        WHEN JUSTIFIED: D5's Enterprise Cloud features — Custom Properties, SCIM, ESM
      Note: ORGAN-III on free plan already has rulesets API limitations (from MEMORY.md).
      Enterprise Cloud becomes justified when there are collaborators or revenue.

  - id: C5
    topic: "Multi-agent orchestration architecture"
    positions:
      D1: "Not addressed — focuses on process, not infrastructure"
      D2: "Multi-model ensemble: Claude for coding, o3 for reasoning, Gemini for context"
      D3: "Same model, different prompts/roles (Architect/Implementer/Tester/Librarian)"
      D4: "AI 'chairs' — different instructions per role, explicitly bounded per organ"
      D5: "Full Orchestrator-Worker pattern with 5 frameworks evaluated (LangChain, AutoGen, CrewAI, Vellum, Orkes)"
    analysis: |
      D2-D4 describe MANUAL orchestration (human switches roles/models).
      D5 describes AUTOMATED orchestration (agents coordinate programmatically).
      These aren't competing — they're different maturity levels:
        Level 1: Human switches between AI tools manually (D2/D3)
        Level 2: Named roles with per-organ boundaries (D4)
        Level 3: Automated multi-agent workflows (D5)
    resolution: |
      PROGRESSIVE ADOPTION:
        NOW: Level 1 + Level 2 — use D4's named roles with D2's model assignments
        NEXT: Add D5's spec.md/plan.md/status.md as structured context for each role
        LATER: Evaluate D5's frameworks when automation justifies the complexity
      Map to existing tool surface:
        - Claude Code (Agent tool) already supports Level 2 (subagent_type parameter)
        - MCP meta-tools (mcp-add, mcp-exec) support Level 3 infrastructure
        - Orchestrator-Worker is achievable NOW via Agent tool + background tasks

  - id: C6
    topic: "How to handle context window limitations"
    positions:
      D1: "Not addressed"
      D2: "Gemini 2.5 Pro for large-context analysis (2M-token window)"
      D3: "Not addressed"
      D4: "Control context: feed narrow, relevant slices instead of entire repos"
      D5: "Programmatic Tool Calling (PTC) — LLM writes scripts that process data in sandbox; also MCP + GraphRAG + tree-sitter"
    analysis: |
      D5 has the most sophisticated answer. D4's "narrow slices" is the
      manual version of what D5 automates via PTC and MCP.
    resolution: |
      IMMEDIATE: D4's approach — narrow context slices, one file at a time
      INVEST IN: D5's approaches:
        - spec.md/plan.md as context-packing strategy (already cheap to implement)
        - MCP is already deployed in your system (19+ Docker MCP servers)
        - GraphRAG via knowledge_graph MCP cluster (already available)
        - tree-sitter is already installed via Homebrew (brew dependency)
      The tool-interaction-design ontology ALREADY maps these connections.

  - id: C7
    topic: "Commodification strategy"
    positions:
      D1: "Open core (templates) + paid accelerators (workshops, dashboards, consulting)"
      D2: "Learn in public → audience → cohort courses → consulting; Swyx/McKay/Levels model"
      D3: "Templates → Course → Consulting playbook; 'commodify institutional grammar'"
      D4: "Pattern language catalog → book → course → consulting"
      D5: "SOP platforms (Whale) + prompt recipe frameworks (Goose) + low-code automation (Zapier/n8n)"
    analysis: |
      D1-D4 agree on the funnel: free templates → paid courses → consulting.
      D5 adds a tooling/platform layer (SaaS). These aren't competing.
    resolution: |
      FULL FUNNEL:
        Layer 1 (Free): Open-source templates, GitHub repos, blog posts, POSSE distribution
        Layer 2 (Low-cost): Cohort courses, pattern language publication, Substack/newsletter
        Layer 3 (Mid-cost): Productized consulting, workshop facilitation
        Layer 4 (High-cost): Custom methodology installation, hosted dashboards (SaaS)
        Layer 5 (Recurring): Membership community (Greg Isenberg ACP model)
      ORGAN MAPPING:
        ORGAN-V (Logos) → Layer 1 + Layer 2 (publication + public process)
        ORGAN-VI (Koinonia) → Layer 5 (community)
        ORGAN-VII (Kerygma) → Distribution for all layers
        ORGAN-III (Ergon) → Layer 3 + Layer 4 (commercial products)

