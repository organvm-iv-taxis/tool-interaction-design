unanimous:

  - id: U1
    claim: "The rhetorician/AI-conductor approach is a STRENGTH, not a deficiency"
    evidence:
      D1: "Your meta-organvm ecosystem already contains an unusually rich 'process-as-product' substrate"
      D2: "Non-traditional background is the asset, not the liability"
      D3: "Your approach as an 'AI-conductor' isn't naiveté—it's emergent methodology (SE 3.0)"
      D4: "Your naiveté is no longer a bug; it is the source of your style"
      D5: "The rhetorician has a structural advantage because the primary mechanism is now semantic articulation"
    implication: "Stop apologizing. Formalize the methodology."

  - id: U2
    claim: "You need a MINIMAL canonical lifecycle, not a heavyweight one"
    evidence:
      D1: "The gap is not absence of process but translation into canonical SDLC-shaped primitives"
      D2: "Use PARA for knowledge, Personal Kanban for work, Shape Up appetite for scoping"
      D3: "Shrink to decision points, not comprehensive coverage"
      D4: "4-step personal loop: Frame, Shape, Build, Prove"
      D5: "AI generation must be bound by a highly structured, human-centered AI-Enabled SDLC"
    implication: "Adopt ONE loop. All five propose variants of the same 3-5 step cycle."

  - id: U3
    claim: "WIP limits are critical — the labyrinth comes from too many concurrent threads"
    evidence:
      D1: "Kanban flow for multi-repo orchestration + WIP control"
      D2: "Personal Kanban's WIP limit is the crucial mechanism: cap how many things can be in progress"
      D3: "Single-Session Scope Limit: define 'what ONE thing am I shipping today?'"
      D4: "At most 3 CANDIDATE efforts across the whole system; at most 1 PUBLIC_PROCESS per organ"
      D5: "Forbid monolithic prompts; use node-based architectures (one function/step at a time)"
    implication: "Enforce WIP limits in registry and session protocol."

  - id: U4
    claim: "Different AI models should serve different ROLES, not be used interchangeably"
    evidence:
      D1: "Not explicitly stated but implied by tiered CI and review workflows"
      D2: "Multi-model ensemble: Claude for conversation/coding, o3 for reasoning, Gemini for large context"
      D3: "Parallel Verification: Ask 2+ AIs to critique each other"
      D4: "Architect, Implementer, Tester, Librarian — different 'chairs' for the same model"
      D5: "Orchestrator-Worker paradigm: central orchestrator delegates to specialized workers"
    implication: "Formalize AI role assignments per lifecycle phase."

  - id: U5
    claim: "The process itself is a commodifiable product"
    evidence:
      D1: "Productize by extracting seed contracts, schema-driven governance, docs-first workflows"
      D2: "Productized consulting $2K-$15K; cohort courses $50-$1,500/student; YouTube+newsletter funnel"
      D3: "Internal Product → External Value → Research Contribution"
      D4: "Organvm Patterns as pattern catalog → book → course → consulting playbook"
      D5: "Identify 20% of workflows that solve 80% of friction and automate relentlessly"
    implication: "Package templates, playbooks, and the method itself as offerings."

  - id: U6
    claim: "Automated enforcement beats willpower — turn discipline into defaults"
    evidence:
      D1: "Use org-wide rulesets/branch protection + required status checks + CODEOWNERS"
      D2: "GitHub Actions makes CI a single YAML file; commit working versions before AI changes"
      D3: "CI gates, structured issue forms encode governance automatically"
      D4: "Add CI checks that fail if repo is missing README sections; automate breadcrumbs"
      D5: "Strict guardrails: inline (blocking) and async (advisory) AI validators in CI/CD"
    implication: "Every recommendation that says 'remember to do X' should become a CI check."

  - id: U7
    claim: "Trunk-based development with short-lived branches"
    evidence:
      D1: "Trunk-based development complements CI; squash-merge"
      D2: "Always commit working versions to Git before asking AI to make changes"
      D3: "Create branch, work in tiny testable slices, commit with phase verbs"
      D4: "Create branch: feat/<organ>/<short-slug>"
      D5: "Incremental bite-sized generation bounded by plan.md"
    implication: "Standardize branch naming and squash-merge across all repos."

  - id: U8
    claim: "Document WHY, not WHAT — intent over implementation"
    evidence:
      D1: "Micro-spec in Issue: Outcome, Non-goals, Acceptance checks, Risk, Rollback"
      D2: "AI generates 'how,' you generate 'why'"
      D3: "Mandatory 'Why' Documentation before writing code"
      D4: "Leave a breadcrumb: what was done, what is next, where it sits in promotion"
      D5: "spec.md as absolute source of truth; status.md as ephemeral session log"
    implication: "Every commit, PR, and session log must answer 'why' first."

  - id: U9
    claim: "Small changes, fast feedback, fast CI"
    evidence:
      D1: "Keep a strict rule: 'if it's slow, it's optional'"
      D2: "The CHAOS Report found small projects are 9× more likely to succeed"
      D3: "Three-Prompt Rule: if you can't get it in 3 iterations, you haven't specified clearly"
      D4: "Work in tiny, testable slices; one file or one function at a time"
      D5: "Forbid monolithic prompts; node-based architectures"
    implication: "One PR = one idea. CI pipeline under 10 minutes."

  - id: U10
    claim: "The organvm organ model maps naturally to bounded contexts (DDD)"
    evidence:
      D1: "Strategic DDD: organs as bounded contexts; schema-definitions as 'published language'"
      D2: "Not explicitly DDD, but 'each organ resembles a domain' implicitly"
      D3: "Organ-as-Stage Model maps organs to SDLC phases"
      D4: "Treat the 8 organs as your role system with explicit responsibilities"
      D5: "Grouping organizations based on shared governance and security requirements"
    implication: "Each organ has its own ubiquitous language, schema contracts, and API boundaries."

