relationship_types:
- id: INVOKES
  description: Tool A can call/launch Tool B
  directionality: directed
- id: FEEDS
  description: Output of A is valid input for B
  directionality: directed
- id: ALTERNATIVE_TO
  description: A and B serve the same function
  directionality: undirected
- id: ENHANCES
  description: A augments the capabilities of B
  directionality: directed
- id: DEPENDS_ON
  description: A requires B to function
  directionality: directed
- id: BRIDGES
  description: A connects domain X to domain Y
  directionality: undirected
relationships:
- source: perplexity_research
  target: knowledge_graph
  type: FEEDS
- source: tavily_search
  target: web_search
  type: ALTERNATIVE_TO
- source: claude_code_core
  target: git_core
  type: INVOKES
- source: git_core
  target: github_platform
  type: BRIDGES
- source: code_analysis_mcp
  target: claude_code_core
  type: ENHANCES
