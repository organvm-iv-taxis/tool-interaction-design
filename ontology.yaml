# =============================================================================
# TOOL INTERACTION ONTOLOGY v1.0
# =============================================================================
# Canonical taxonomy for tools across Claude Code, MCP servers,
# macOS applications, Homebrew packages, and runtime ecosystems.
# =============================================================================

version: "1.1"
created: "2026-03-03"
updated: "2026-03-03"
surface_count: 578
surface_count_note: "578 distinct tools enumerated across 64 clusters in 12 domains. Additional ~90 Skills invoke these tools but are a meta-layer, not counted separately."

# =============================================================================
# TAXONOMY
# =============================================================================

taxonomy:

  domains:
    - id: AI_AGENTS
      label: "AI Agents & Assistants"
      description: "LLM-powered tools that generate, analyze, and orchestrate"

    - id: CODE
      label: "Code Authoring & Analysis"
      description: "Reading, writing, editing, analyzing source code"

    - id: GIT_SCM
      label: "Version Control & Collaboration"
      description: "Git operations, PRs, issues, code review"

    - id: CLOUD_DEPLOY
      label: "Cloud & Deployment"
      description: "Infrastructure, hosting, CI/CD, containers"

    - id: CREATIVE
      label: "Creative & Media"
      description: "Audio, visual, design, 3D, music production"

    - id: RESEARCH
      label: "Research & Knowledge"
      description: "Search, fetch, knowledge graphs, documentation"

    - id: DATA
      label: "Data & Databases"
      description: "SQL, pipelines, analysis, storage"

    - id: SECURITY
      label: "Security & Compliance"
      description: "Scanning, secrets, threat modeling, audit"

    - id: SYSTEM
      label: "System & OS"
      description: "Filesystem, processes, shell, configuration"

    - id: ORCHESTRATION
      label: "Orchestration & Meta"
      description: "Task management, MCP meta-tools, workflow coordination"

    - id: COMMUNICATION
      label: "Communication & Collaboration"
      description: "Messaging, notifications, documentation sharing"

    - id: BROWSER
      label: "Browser Automation"
      description: "Web page interaction, scraping, testing"

  capabilities:
    - READ           # Read files, data, resources, state
    - WRITE          # Create new files, data, resources
    - EDIT           # Modify existing content in place
    - SEARCH         # Find, discover, query content
    - EXECUTE        # Run commands, code, scripts
    - ANALYZE        # Inspect, audit, assess, profile
    - DEPLOY         # Ship to production, publish
    - GENERATE       # Create new content, code, media
    - TRANSFORM      # Convert formats, reshape data
    - MONITOR        # Observe, log, alert, track
    - AUTHENTICATE   # Auth, identity, permissions
    - ORCHESTRATE    # Coordinate multiple tools/steps
    - VISUALIZE      # Render, display, graph, diagram
    - TEST           # Validate, verify, assert
    - CONFIGURE      # Set up, tune, manage settings
    - FETCH          # Retrieve remote content
    - STORE          # Persist data, state, memory
    - NAVIGATE       # Browse, explore, traverse
    - COMPOSE        # Combine, merge, chain outputs
    - COMMUNICATE    # Send messages, post, notify

  protocols:
    - id: MCP
      label: "Model Context Protocol"
      description: "Structured tool calls via JSON-RPC"
      bidirectional: true
      automatable: true

    - id: CLI
      label: "Command Line Interface"
      description: "Shell commands via Bash tool"
      bidirectional: true
      automatable: true

    - id: API
      label: "HTTP/REST/GraphQL"
      description: "Network API calls"
      bidirectional: true
      automatable: true

    - id: FILESYSTEM
      label: "File System"
      description: "Read/write files as data exchange"
      bidirectional: true
      automatable: true

    - id: STDIO
      label: "Standard I/O Pipes"
      description: "stdin/stdout/stderr streaming"
      bidirectional: true
      automatable: true

    - id: GUI
      label: "Graphical Interface"
      description: "Visual apps — automatable only via browser/accessibility tools"
      bidirectional: false
      automatable: false

    - id: BROWSER_AUTO
      label: "Browser Automation"
      description: "Playwright/Puppeteer/Chrome extension control"
      bidirectional: true
      automatable: true

  data_types:
    - id: TEXT
      mime: "text/plain"
      extensions: [".txt", ".md", ".rst"]

    - id: CODE
      mime: "text/*"
      extensions: [".py", ".ts", ".js", ".rs", ".go", ".rb", ".sh", ".zsh"]

    - id: JSON
      mime: "application/json"
      extensions: [".json", ".jsonl"]

    - id: YAML
      mime: "application/yaml"
      extensions: [".yaml", ".yml"]

    - id: HTML
      mime: "text/html"
      extensions: [".html", ".htm"]

    - id: IMAGE
      mime: "image/*"
      extensions: [".png", ".jpg", ".gif", ".svg", ".webp"]

    - id: AUDIO
      mime: "audio/*"
      extensions: [".wav", ".mp3", ".flac", ".aiff"]

    - id: VIDEO
      mime: "video/*"
      extensions: [".mp4", ".mov", ".webm"]

    - id: PDF
      mime: "application/pdf"
      extensions: [".pdf"]

    - id: BINARY
      mime: "application/octet-stream"
      extensions: [".wasm", ".bin", ".exe"]

    - id: NOTEBOOK
      mime: "application/x-ipynb+json"
      extensions: [".ipynb"]

    - id: CONFIG
      mime: "text/*"
      extensions: [".toml", ".env", ".ini", ".cfg"]

    - id: STREAM
      mime: "application/x-ndjson"
      description: "Continuous/streaming data (logs, events)"

    - id: DIAGRAM
      mime: "text/x-mermaid"
      extensions: [".mmd", ".mermaid"]

    - id: SQL
      mime: "application/sql"
      extensions: [".sql"]

