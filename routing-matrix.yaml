# =============================================================================
# ROUTING MATRIX v1.0
# =============================================================================
# Defines how data flows between tool clusters. Each route specifies:
#   - source cluster → target cluster
#   - data types that flow between them
#   - the protocol used for the connection
#   - concrete tool pairings (exemplars)
#   - whether the route is automatable (no human in the loop)
# =============================================================================

version: "1.0"
created: "2026-03-03"

# =============================================================================
# CORE ROUTING RULES
# =============================================================================

routing_rules:

  # Rule 1: Protocol compatibility determines routability
  # Two clusters can connect if they share at least one protocol
  # Exception: GUI-only clusters require browser automation bridge

  # Rule 2: Data type compatibility determines data flow
  # Source output_type must match target input_type

  # Rule 3: Automation level
  # MCP↔MCP: fully automatable
  # CLI↔CLI: fully automatable (via Bash piping)
  # MCP↔CLI: automatable (MCP result → Bash input)
  # GUI→MCP: requires browser automation bridge
  # GUI→GUI: not automatable (human only)

# =============================================================================
# ROUTE DEFINITIONS
# =============================================================================

routes:

  # ===========================================================================
  # RESEARCH → KNOWLEDGE (Ingestion Pipeline)
  # ===========================================================================

  - id: search_to_kg
    from: web_search
    to: knowledge_graph
    data_flow: TEXT → JSON
    protocol: MCP → MCP
    automatable: true
    description: "Search results ingested into knowledge graph as entities"
    exemplars:
      - source: perplexity_research
        target: create_entities
        transform: "extract_key_facts as intermediate"
      - source: tavily_search
        target: create_entities
      - source: WebSearch
        target: create_entities

  - id: wikipedia_to_kg
    from: wikipedia
    to: knowledge_graph
    data_flow: TEXT → JSON
    protocol: MCP → MCP
    automatable: true
    exemplars:
      - source: get_article
        target: create_entities
      - source: summarize_article_for_query
        target: add_observations

  - id: academic_to_kg
    from: academic_research
    to: knowledge_graph
    data_flow: JSON → JSON
    protocol: MCP → MCP
    automatable: true
    exemplars:
      - source: semanticSearch
        target: create_entities
      - source: paper_search
        target: create_relations

  - id: search_to_notion
    from: web_search
    to: knowledge_apps
    data_flow: TEXT → JSON
    protocol: MCP → MCP
    automatable: true
    exemplars:
      - source: perplexity_research
        target: "notion-create-pages"
      - source: tavily_research
        target: "notion-create-pages"

  - id: web_content_to_kg
    from: web_content
    to: knowledge_graph
    data_flow: TEXT → JSON
    protocol: MCP → MCP
    automatable: true
    exemplars:
      - source: fetch_content
        target: create_entities
      - source: extract_key_facts
        target: add_observations

  - id: media_to_kg
    from: media_research
    to: knowledge_graph
    data_flow: TEXT → JSON
    protocol: MCP → MCP
    automatable: true
    exemplars:
      - source: get_transcript
        target: create_entities

  # ===========================================================================
  # CODE → GIT → GITHUB (Development Pipeline)
  # ===========================================================================

  - id: editor_to_git
    from: claude_code_core
    to: git_core
    data_flow: CODE → CODE
    protocol: FILESYSTEM → CLI
    automatable: true
    description: "Code changes committed to version control"
    exemplars:
      - source: Edit
        target: "git add && git commit"
      - source: Write
        target: git_add

  - id: git_to_github
    from: git_core
    to: github_platform
    data_flow: CODE → CODE
    protocol: CLI → MCP
    automatable: true
    description: "Local commits pushed and PRs created"
    exemplars:
      - source: "git push"
        target: create_pull_request
      - source: git_commit
        target: "gh pr create"

  - id: analysis_to_git
    from: code_analysis_mcp
    to: git_core
    data_flow: JSON → CODE
    protocol: MCP → CLI
    automatable: true
    description: "Analysis findings drive code changes then commits"
    exemplars:
      - source: analyze_python_file
        intermediate: Edit
        target: git_commit

  - id: security_to_github
    from: git_security
    to: github_platform
    data_flow: JSON → TEXT
    protocol: CLI → MCP
    automatable: true
    description: "Security scan results posted as PR comments or issues"
    exemplars:
      - source: gitleaks
        target: add_issue_comment
      - source: trivy
        target: add_comment_to_pending_review

  # ===========================================================================
  # GITHUB → CLOUD (Deployment Pipeline)
  # ===========================================================================

  - id: github_to_vercel
    from: github_platform
    to: vercel_platform
    data_flow: CODE → CODE
    protocol: MCP → MCP
    automatable: true
    description: "Merged PRs trigger Vercel deployments"
    exemplars:
      - source: merge_pull_request
        target: deploy_to_vercel

  - id: github_to_cloudflare
    from: github_platform
    to: cloudflare_platform
    data_flow: CODE → CODE
    protocol: MCP → CLI
    automatable: true
    exemplars:
      - source: merge_pull_request
        target: "wrangler deploy"

  - id: github_to_netlify
    from: github_platform
    to: netlify_platform
    data_flow: CODE → CODE
    protocol: MCP → MCP
    automatable: true
    exemplars:
      - source: merge_pull_request
        target: "netlify-deploy-services-updater"

  - id: github_to_gcp
    from: github_platform
    to: gcp_platform
    data_flow: CODE → CODE
    protocol: MCP → CLI
    automatable: true
    exemplars:
      - source: merge_pull_request
        target: "gcloud run deploy"

  # ===========================================================================
  # DESIGN → CODE (Design-to-Code Pipeline)
  # ===========================================================================

  - id: figma_to_code
    from: visual_design
    to: claude_code_core
    data_flow: "[IMAGE, JSON] → CODE"
    protocol: MCP → FILESYSTEM
    automatable: true
    description: "Figma designs converted to code via get_design_context"
    exemplars:
      - source: get_design_context
        target: Write
      - source: get_screenshot
        intermediate: "AI analysis"
        target: Edit

  - id: diagram_to_code
    from: diagramming
    to: claude_code_core
    data_flow: DIAGRAM → CODE
    protocol: MCP → FILESYSTEM
    automatable: true
    exemplars:
      - source: validate_and_render_mermaid_diagram
        target: Write

  # ===========================================================================
  # CODE → BROWSER (Testing Pipeline)
  # ===========================================================================

  - id: code_to_browser_test
    from: claude_code_core
    to: browser_chrome
    data_flow: CODE → HTML
    protocol: FILESYSTEM → BROWSER_AUTO
    automatable: true
    description: "Code changes verified via browser automation"
    exemplars:
      - source: Write
        intermediate: "dev server start"
        target: navigate
      - source: Edit
        target: read_page

  - id: code_to_playwright
    from: claude_code_core
    to: browser_playwright
    data_flow: CODE → HTML
    protocol: FILESYSTEM → MCP
    automatable: true
    exemplars:
      - source: Write
        target: browser_navigate

  # ===========================================================================
  # SENTRY → CODE (Error Resolution Pipeline)
  # ===========================================================================

  - id: sentry_to_code
    from: sentry_monitoring
    to: claude_code_core
    data_flow: JSON → CODE
    protocol: MCP → FILESYSTEM
    automatable: true
    description: "Sentry issues drive code fixes"
    exemplars:
      - source: get_issue_details
        target: Edit
      - source: analyze_issue_with_seer
        target: Edit

  - id: sentry_to_github
    from: sentry_monitoring
    to: github_platform
    data_flow: JSON → TEXT
    protocol: MCP → MCP
    automatable: true
    exemplars:
      - source: search_issues
        target: issue_write

  # ===========================================================================
  # JAM → CODE (Bug Fix Pipeline)
  # ===========================================================================

  - id: jam_to_code
    from: bug_reporting
    to: claude_code_core
    data_flow: "[JSON, IMAGE] → CODE"
    protocol: MCP → FILESYSTEM
    automatable: true
    exemplars:
      - source: getDetails
        target: Edit
      - source: getConsoleLogs
        target: Edit

  - id: jam_to_github
    from: bug_reporting
    to: github_platform
    data_flow: JSON → TEXT
    protocol: MCP → MCP
    automatable: true
    exemplars:
      - source: getDetails
        target: issue_write

  # ===========================================================================
  # DATA ↔ CODE (Data Pipeline)
  # ===========================================================================

  - id: neon_to_code
    from: neon_database
    to: claude_code_core
    data_flow: JSON → CODE
    protocol: MCP → FILESYSTEM
    automatable: true
    description: "Schema introspection drives code generation"
    exemplars:
      - source: describe_table_schema
        target: Write
      - source: explain_sql_statement
        target: Edit

  - id: code_to_neon
    from: claude_code_core
    to: neon_database
    data_flow: SQL → JSON
    protocol: FILESYSTEM → MCP
    automatable: true
    exemplars:
      - source: Write
        target: run_sql
      - source: Read
        target: prepare_database_migration

  - id: jupyter_to_code
    from: jupyter_notebooks
    to: claude_code_core
    data_flow: "[CODE, JSON] → CODE"
    protocol: MCP → FILESYSTEM
    automatable: true
    exemplars:
      - source: execute_cell
        target: Write
      - source: read_notebook
        target: Edit

  # ===========================================================================
  # CROSS-DOMAIN BRIDGES
  # ===========================================================================

  - id: research_to_code
    from: documentation
    to: claude_code_core
    data_flow: TEXT → CODE
    protocol: MCP → FILESYSTEM
    automatable: true
    description: "Library docs inform code authoring"
    exemplars:
      - source: "get-library-docs"
        target: Write

  - id: kg_to_notion
    from: knowledge_graph
    to: knowledge_apps
    data_flow: JSON → JSON
    protocol: MCP → MCP
    automatable: true
    description: "Knowledge graph entities exported to Notion"
    exemplars:
      - source: read_graph
        target: "notion-create-pages"

  - id: notion_to_code
    from: knowledge_apps
    to: claude_code_core
    data_flow: JSON → CODE
    protocol: MCP → FILESYSTEM
    automatable: true
    description: "Notion specs drive code implementation"
    exemplars:
      - source: "notion-search"
        target: Write

  - id: container_to_monitor
    from: container_orchestration
    to: observability
    data_flow: STREAM → JSON
    protocol: CLI → API
    automatable: true
    exemplars:
      - source: "docker logs"
        target: "grafana/alloy"

  - id: ai_to_creative
    from: claude_code_core
    to: diagramming
    data_flow: TEXT → DIAGRAM
    protocol: MCP → MCP
    automatable: true
    description: "AI generates diagrams from descriptions"
    exemplars:
      - source: "Generate mermaid text"
        target: validate_and_render_mermaid_diagram

  - id: config_to_shell
    from: system_config
    to: shell_environment
    data_flow: CONFIG → TEXT
    protocol: CLI → CLI
    automatable: true
    description: "Config tools shape shell environment"
    exemplars:
      - source: chezmoi
        target: zsh
      - source: direnv
        target: zsh
      - source: starship
        target: zsh

  # ===========================================================================
  # SKILL ROUTES
  # ===========================================================================

  - id: skill_dispatch
    from: claude_code_core
    to: "*"
    data_flow: TEXT → TEXT
    protocol: MCP → MCP
    automatable: true
    description: "Skills are meta-tools that compose multiple clusters"
    exemplars:
      - source: Skill
        target: "[any cluster via Skill workflow]"
    note: "Skills have their own internal routing — see skills section"

alternatives:
    - cluster: web_search
      tools_ranked:
        - perplexity_research  # Best for deep research
        - tavily_search        # Best for structured extraction
        - WebSearch            # Built-in, always available
        - search               # Docker fallback

    - cluster: browser_automation
      tools_ranked:
        - browser_chrome       # Chrome extension, real browser
        - browser_playwright   # Docker, headless, most reliable
        - browser_puppeteer    # Docker, headless, simpler API

    - cluster: code_editing
      tools_ranked:
        - Edit                 # Built-in, precise string replace
        - edit_file            # MCP Docker fallback
        - edit_block           # MCP Docker block-level
        - "sed via Bash"       # Last resort

    - cluster: file_reading
      tools_ranked:
        - Read                 # Built-in, best UX
        - read_file            # MCP Docker
        - read_multiple_files  # MCP Docker batch
        - "cat via Bash"       # Last resort

    - cluster: git_operations
      tools_ranked:
        - "git via Bash"       # Most complete
        - "gh CLI"             # GitHub-specific
        - mcp_github           # MCP, structured output
        - mcp_docker_git       # Docker, isolated

    - cluster: deployment
      tools_ranked:
        - vercel               # Frontend/Next.js
        - cloudflare           # Workers/edge
        - netlify              # Static/Jamstack
        - gcp                  # Full cloud
        - docker               # Containers

    - cluster: database
      tools_ranked:
        - neon_database        # Managed Postgres (MCP)
        - cloudflare_data      # Edge (D1/KV/R2)
        - "psql via Bash"      # Direct CLI

# =============================================================================
# ROUTING PRIORITY MATRIX
# =============================================================================
# When multiple routes exist, use this priority order:
#
#   1. MCP → MCP (highest fidelity, structured, typed)
#   2. CLI → CLI (fast, composable via pipes)
#   3. MCP → CLI (cross-protocol, slight overhead)
#   4. CLI → MCP (needs output parsing)
#   5. FILESYSTEM mediated (write file → read file)
#   6. BROWSER_AUTO (slowest, most fragile)
#   7. GUI (not automatable — human-only fallback)
#
# =============================================================================

# =============================================================================
# CAPABILITY ROUTING TABLE
# =============================================================================
# Given a capability need, which clusters to route to (in priority order)
# =============================================================================

capability_routing:
  READ:
    - claude_code_core     # Read, Glob, Grep
    - filesystem_mcp       # Docker filesystem
    - filesystem_cli       # bat, eza, fd
    - github_platform      # get_file_contents
    - neon_database        # run_sql
    - knowledge_apps       # notion-search

  WRITE:
    - claude_code_core     # Write, Edit
    - filesystem_mcp       # write_file
    - github_platform      # create_or_update_file, push_files
    - neon_database        # run_sql (INSERT/UPDATE)
    - knowledge_graph      # create_entities
    - knowledge_apps       # notion-create-pages

  SEARCH:
    - claude_code_core     # Grep, Glob
    - web_search           # perplexity, tavily, WebSearch
    - github_platform      # search_code, search_issues
    - wikipedia            # search_wikipedia
    - academic_research    # semanticSearch, paper_search
    - documentation        # get-library-docs
    - knowledge_graph      # search_nodes
    - knowledge_apps       # notion-search
    - neon_database        # run_sql (SELECT)
    - npm_registry         # search_npm_packages

  EXECUTE:
    - claude_code_core     # Bash
    - code_execution       # run_js, sandbox_exec
    - process_management   # start_process
    - jupyter_notebooks    # execute_cell
    - container_orchestration  # docker run

  ANALYZE:
    - code_analysis_mcp    # analyze_python_*
    - code_quality_cli     # shellcheck, black
    - security_scanning    # trivy, gitleaks
    - sentry_monitoring    # analyze_issue_with_seer
    - neon_database        # explain_sql_statement

  DEPLOY:
    - vercel_platform
    - cloudflare_platform
    - netlify_platform
    - gcp_platform
    - container_orchestration
    - github_platform      # releases

  GENERATE:
    - claude_code_core     # AI generation
    - ai_cli_agents        # codex, gemini
    - diagramming          # mermaid, threejs
    - visual_design        # figma generate
    - publishing           # write_pdf

  TRANSFORM:
    - data_tools           # jq, yq, gron
    - web_content          # convert_to_markdown
    - video_production     # ffmpeg
    - publishing           # poppler, qpdf

  MONITOR:
    - sentry_monitoring
    - process_management   # btop, htop
    - observability        # grafana
    - vercel_platform      # get_runtime_logs
    - container_orchestration

  TEST:
    - code_execution       # sandbox_exec
    - browser_chrome       # browser testing
    - browser_playwright   # headless testing
    - ci_cd                # act (local GitHub Actions)
    - code_quality_cli     # bats-core
    - link_validation      # lychee
    - security_scanning    # trivy, gitleaks

  VISUALIZE:
    - diagramming          # mermaid, threejs
    - jupyter_notebooks    # inline plots
    - visual_design        # figma
    - observability        # grafana
    - publishing           # keynote

  STORE:
    - neon_database        # Postgres
    - cloudflare_data      # D1, KV, R2
    - knowledge_graph      # entity store
    - knowledge_apps       # Notion, Obsidian
    - git_core             # version-controlled storage

  COMMUNICATE:
    - github_platform      # issues, PRs, comments
    - bug_reporting        # Jam
    - messaging_apps       # Discord, WhatsApp (GUI only)
    - sentry_monitoring    # issue updates

  ORCHESTRATE:
    - claude_code_core     # Agent, Skill, TaskCreate
    - mcp_meta             # mcp-add, mcp-exec
    - sequential_thinking  # sequentialthinking
    - task_management      # TaskCreate, TaskUpdate
