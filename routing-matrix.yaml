version: '1.0'
created: '2026-03-03'
routing_rules: null
routes:
- id: search_to_kg
  from: web_search
  to: knowledge_graph
  data_flow: "TEXT \u2192 JSON"
  protocol: "MCP \u2192 MCP"
  automatable: true
  description: Search results ingested into knowledge graph as entities
  exemplars:
  - source: perplexity_research
    target: create_entities
    transform: extract_key_facts as intermediate
  - source: tavily_search
    target: create_entities
  - source: WebSearch
    target: create_entities
- id: wikipedia_to_kg
  from: wikipedia
  to: knowledge_graph
  data_flow: "TEXT \u2192 JSON"
  protocol: "MCP \u2192 MCP"
  automatable: true
  exemplars:
  - source: get_article
    target: create_entities
  - source: summarize_article_for_query
    target: add_observations
- id: academic_to_kg
  from: academic_research
  to: knowledge_graph
  data_flow: "JSON \u2192 JSON"
  protocol: "MCP \u2192 MCP"
  automatable: true
  exemplars:
  - source: semanticSearch
    target: create_entities
  - source: paper_search
    target: create_relations
- id: search_to_notion
  from: web_search
  to: knowledge_apps
  data_flow: "TEXT \u2192 JSON"
  protocol: "MCP \u2192 MCP"
  automatable: true
  exemplars:
  - source: perplexity_research
    target: notion-create-pages
  - source: tavily_research
    target: notion-create-pages
- id: web_content_to_kg
  from: web_content
  to: knowledge_graph
  data_flow: "TEXT \u2192 JSON"
  protocol: "MCP \u2192 MCP"
  automatable: true
  exemplars:
  - source: fetch_content
    target: create_entities
  - source: extract_key_facts
    target: add_observations
- id: media_to_kg
  from: media_research
  to: knowledge_graph
  data_flow: "TEXT \u2192 JSON"
  protocol: "MCP \u2192 MCP"
  automatable: true
  exemplars:
  - source: get_transcript
    target: create_entities
- id: editor_to_git
  from: claude_code_core
  to: git_core
  data_flow: "CODE \u2192 CODE"
  protocol: "FILESYSTEM \u2192 CLI"
  automatable: true
  description: Code changes committed to version control
  exemplars:
  - source: Edit
    target: git add && git commit
  - source: Write
    target: git_add
- id: git_to_github
  from: git_core
  to: github_platform
  data_flow: "CODE \u2192 CODE"
  protocol: "CLI \u2192 MCP"
  automatable: true
  description: Local commits pushed and PRs created
  exemplars:
  - source: git push
    target: create_pull_request
  - source: git_commit
    target: gh pr create
- id: analysis_to_git
  from: code_analysis_mcp
  to: git_core
  data_flow: "JSON \u2192 CODE"
  protocol: "MCP \u2192 CLI"
  automatable: true
  description: Analysis findings drive code changes then commits
  exemplars:
  - source: analyze_python_file
    intermediate: Edit
    target: git_commit
- id: security_to_github
  from: git_security
  to: github_platform
  data_flow: "JSON \u2192 TEXT"
  protocol: "CLI \u2192 MCP"
  automatable: true
  description: Security scan results posted as PR comments or issues
  exemplars:
  - source: gitleaks
    target: add_issue_comment
  - source: trivy
    target: add_comment_to_pending_review
- id: github_to_vercel
  from: github_platform
