# Fleet Agent Registry — declares every AI agent with subscription,
# capabilities, phase affinity, and sensitivity constraints.

agents:
  claude:
    display_name: "Claude Code (Opus 4.6)"
    provider: anthropic
    subscription:
      tier: max
      billing_cycle: monthly
      allotment:
        messages_per_day: 45
        context_window: 200000
    capabilities:
      strengths: [deep-coding, refactoring, architecture, testing, mcp-tools]
      weaknesses: [web-browsing-native, image-generation]
    phase_affinity:
      FRAME: 0.7
      SHAPE: 0.9
      BUILD: 1.0
      PROVE: 0.9
    sensitivity:
      can_see_secrets: true
      can_push_git: true
      can_run_shell: true
    restrictions:
      never_touch: []
      never_decide: []
      max_cognitive_class: strategic
    guardrails:
      self_audit_trusted: true
      max_files_before_checkpoint: 50
      handoff_envelope_required: false
    active: true

  gemini:
    display_name: "Gemini CLI (2.5 Pro)"
    provider: google
    subscription:
      tier: pro
      billing_cycle: monthly
      allotment:
        requests_per_day: 25
        context_window: 1000000
    capabilities:
      strengths: [deep-research, long-context, web-grounding, multi-modal]
      weaknesses: [file-editing-precision, git-safety]
    phase_affinity:
      FRAME: 1.0
      SHAPE: 0.8
      BUILD: 0.5
      PROVE: 0.6
    sensitivity:
      can_see_secrets: false
      can_push_git: false
      can_run_shell: true
    restrictions:
      never_touch:
        - "package.json"
        - "*.config.ts"
        - "*.config.js"
        - "*.config.mjs"
        - "drizzle.config.*"
        - "astro.config.*"
        - ".env*"
        - "seed.yaml"
        - "pyproject.toml"
      never_decide:
        - architecture
        - dependency_selection
        - schema_design
      max_cognitive_class: mechanical
    guardrails:
      self_audit_trusted: false
      max_files_before_checkpoint: 20
      handoff_envelope_required: false
    active: true

