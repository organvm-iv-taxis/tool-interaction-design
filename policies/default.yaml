name: default
wip:
  max_candidate_per_organ: 3
  max_public_process_per_organ: 1
validation:
  strict_default: false
  fail_on_warnings: false
routing:
  max_path_depth: 5
  max_paths_returned: 5
observability:
  enabled: true
  top_failure_buckets: 10
  trend_warn_rate: 0.20
  trend_critical_rate: 0.40
  trend_min_events: 25
