name: relaxed
wip:
  max_candidate_per_organ: 5
  max_public_process_per_organ: 2
validation:
  strict_default: false
  fail_on_warnings: false
routing:
  max_path_depth: 6
  max_paths_returned: 8
observability:
  enabled: true
  top_failure_buckets: 10
  trend_warn_rate: 0.30
  trend_critical_rate: 0.55
  trend_min_events: 30
