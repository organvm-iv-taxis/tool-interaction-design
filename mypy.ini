[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
strict = True
files = conductor/policy.py,conductor/schemas.py,conductor/integrity.py,conductor/doctor.py,conductor/plugins.py,conductor/migrate.py,tools/release_guardrails.py
follow_imports = skip

[mypy-yaml]
ignore_missing_imports = True

[mypy-jsonschema]
ignore_missing_imports = True
